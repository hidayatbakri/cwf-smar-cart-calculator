<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Cart Calculator</title>
    <link href="./output.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container mx-auto max-w-4xl">
      <h1 class="text-blue-600 font-bold text-2xl py-5">
        Smart Cart Calculator
      </h1>

      <form id="form">
        <div id="elementLocation">
          <div class="grid md:grid-cols-2 gap-4 mb-3">
            <div class="form-group flex flex-col gap-2 col-span-2">
              <label for="name" class="text-slate-800">Nama:</label>
              <input
                type="text"
                class="outline -outline-offset-2 outline-gray-400 p-2 rounded name"
                placeholder="Masukkan Nama"
                id="name"
                required
              />
            </div>
            <div class="form-group flex flex-col gap-2">
              <label for="price" class="text-slate-800">Harga:</label>
              <input
                type="number"
                class="outline -outline-offset-2 outline-gray-400 p-2 rounded price"
                placeholder="Masukkan Harga"
                id="price"
                required
              />
            </div>
            <div class="form-group flex flex-col gap-2">
              <label for="qty" class="text-slate-800">Quantity:</label>
              <input
                type="number"
                class="outline -outline-offset-2 outline-gray-400 p-2 rounded qty"
                placeholder="Masukkan Quantity"
                id="qty"
                required
              />
            </div>
          </div>
          <div class="grid md:grid-cols-2 gap-4 mb-3">
            <div class="form-group flex flex-col gap-2 col-span-2">
              <label for="name" class="text-slate-800">Nama:</label>
              <input
                type="text"
                class="outline -outline-offset-2 outline-gray-400 p-2 rounded name"
                placeholder="Masukkan Nama"
                id="name"
                required
              />
            </div>
            <div class="form-group flex flex-col gap-2">
              <label for="price" class="text-slate-800">Harga:</label>
              <input
                type="number"
                class="outline -outline-offset-2 outline-gray-400 p-2 rounded price"
                placeholder="Masukkan Harga"
                id="price"
                required
              />
            </div>
            <div class="form-group flex flex-col gap-2">
              <label for="qty" class="text-slate-800">Quantity:</label>
              <input
                type="number"
                class="outline -outline-offset-2 outline-gray-400 p-2 rounded qty"
                placeholder="Masukkan Quantity"
                id="qty"
                required
              />
            </div>
          </div>
        </div>

        <div class="flex justify-end my-5 gap-5">
          <button
            class="bg-blue-600 text-white px-5 py-2 rounded cursor-pointer hover:bg-blue-700 ease-in duration-150"
          >
            Hitung
          </button>
        </div>
      </form>

      <div class="bg-blue-100/50 p-5 mt-10">
        <h1 class="font-bold">Hasil Perhitungan</h1>

        <table class="my-6">
          <tr>
            <td class="text-sm py-2 w-40">Sub Total</td>
            <td class="text-sm py-2 w-10">:</td>
            <td class="text-sm py-2" id="setSubTotal"></td>
          </tr>
          <tr>
            <td class="text-sm py-2">Diskon</td>
            <td class="text-sm py-2">:</td>
            <td class="text-sm py-2" id="setDiscount"></td>
          </tr>
          <tr>
            <td class="text-sm py-2">Pajak</td>
            <td class="text-sm py-2">:</td>
            <td class="text-sm py-2" id="setTax"></td>
          </tr>
          <tr>
            <td class="text-sm py-2">Total</td>
            <td class="text-sm py-2">:</td>
            <td class="text-sm py-2" id="setTotal"></td>
          </tr>
        </table>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../main.js"></script>
  </body>
</html>
